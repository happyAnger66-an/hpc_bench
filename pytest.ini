[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    cuda: marks tests that require CUDA (skip if not available)
    triton: marks tests that require triton and CUDA
    cute_dsl: marks tests that require nvidia cutlass python (CuTe DSL) and CUDA
    cutile: marks tests that require cuda.tile (cuTile) and CUDA
    cutlass_ext: marks tests that compile CUTLASS-tagged CUDA extensions
    tilelang: marks tests that require tilelang and CUDA
